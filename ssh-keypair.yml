---
- name: Self-service SSH keypair import/create
  hosts: localhost
  gather_facts: false
  connection: local

  tasks:
    - name: Validate pasted public key format
      ansible.builtin.assert:
        that:
          - (user_public_key | trim) is match('^(ssh-rsa|ssh-ed25519|ecdsa-sha2-\S+)\s+\S+')
        fail_msg: "That doesn't look like a valid SSH public key."
      when: key_action == "import"

    - name: Import user's existing public key
      openstack.cloud.keypair:
        state: present
        validate_certs: false
        name: "{{ keypair_name }}"
        public_key: "{{ user_public_key }}"
      when: key_action == "import"

    - name: Generate a new keypair in OpenStack
      openstack.cloud.keypair:
        state: present
        validate_certs: false
        name: "{{ keypair_name }}"
      register: kp
      no_log: true
      when: key_action == "create"

    - name: Display generated private key
      ansible.builtin.debug:
        msg: |
          ============================================
          SAVE THIS PRIVATE KEY NOW
          It cannot be retrieved again.
          ============================================

          {{ kp.keypair.private_key }}
      when:
        - key_action == "create"
        - kp.keypair.private_key is defined
